name: Fetch Jira Defects

on:
  schedule:
    # Every 15 minutes, Mon–Fri 07:00–19:00 UTC
    - cron: '*/15 7-19 * * 1-5'
  workflow_dispatch:   # allow manual run from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch defects + sprint trend from Jira
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          python3 - << 'PY'
          import json, re, urllib.request, urllib.parse, base64, os
          from datetime import datetime, timezone

          email = os.environ['JIRA_EMAIL']
          token = os.environ['JIRA_TOKEN']
          b64   = base64.b64encode(f'{email}:{token}'.encode()).decode()
          hdr   = {'Authorization': f'Basic {b64}', 'Accept': 'application/json'}

          DOMAIN = 'nhbc.atlassian.net'
          BOARD  = '2766'
          FIELDS = ('summary,status,priority,assignee,created,updated,'
                    'resolutiondate,customfield_10205,customfield_10016')
          JQL    = urllib.parse.quote('issuetype in (Bug,Defect)')

          def get(url):
              req = urllib.request.Request(url, headers=hdr)
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read())

          # ── All defects (paginated) ──────────────────────────────────────
          defects, start, total = [], 0, 1
          while start < total:
              url = (f'https://{DOMAIN}/rest/agile/1.0/board/{BOARD}/issue'
                     f'?jql={JQL}&fields={FIELDS}&startAt={start}&maxResults=100')
              page_data = get(url)
              total  = page_data.get('total', 0)
              page   = page_data.get('issues', [])
              defects.extend(page)
              start += len(page)
              if not page:
                  break
          print(f'Fetched {len(defects)} defects (total reported: {total})')

          # ── Sprint trend: last 5 unique periods, merge parallel streams ──
          sd = get(f'https://{DOMAIN}/rest/agile/1.0/board/{BOARD}/sprint'
                   f'?state=closed&maxResults=50')

          # Deduplicate by sprint ID, sort ascending (oldest first)
          seen_ids, sprints = set(), []
          for s in sorted(sd.get('values', []), key=lambda x: x['id']):
              if s['id'] not in seen_ids:
                  seen_ids.add(s['id'])
                  sprints.append(s)

          done_re = re.compile(r'done|complet|close|resolv|fixed', re.I)
          trend_map = {}  # label → {name, open, closed}

          for sp in sprints:
              si = get(f'https://{DOMAIN}/rest/agile/1.0/sprint/{sp["id"]}'
                       f'/issue?fields=status&maxResults=500')
              issues  = si.get('issues', [])
              closed  = sum(1 for i in issues
                            if done_re.search(i['fields']['status']['name']))
              open_ct = len(issues) - closed
              # Normalise label: "Claims Sprint 15" → "Spr 15" (12-char cap)
              label = re.sub(r'^.*?sprint\s*', 'Spr ', sp['name'],
                             flags=re.I)[:12].strip()
              if label in trend_map:
                  trend_map[label]['open']   += open_ct
                  trend_map[label]['closed'] += closed
              else:
                  trend_map[label] = {'name': label,
                                      'open': open_ct,
                                      'closed': closed}

          trend = list(trend_map.values())[-5:]
          print(f'Sprint trend: {[t["name"] for t in trend]}')

          # ── Write output ────────────────────────────────────────────────
          out = {
              'defects':   defects,
              'trend':     trend,
              'fetchedAt': datetime.now(timezone.utc).isoformat(),
          }
          with open('phoenix-dashboard/defects.json', 'w') as f:
              json.dump(out, f, separators=(',', ':'))
          print('Written phoenix-dashboard/defects.json')
          PY

      - name: Commit if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add phoenix-dashboard/defects.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update defects data [skip ci]"
            git push
          fi
