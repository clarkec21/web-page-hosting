# .github/workflows/jira-fetch.yml
#
# Fetches Jira sprint data and commits phoenix-dashboard/data.json via
# the GitHub API — no actions/checkout required, no Node.js dependency.
#
# Repository secrets required (Settings → Secrets and variables → Actions):
#   JIRA_EMAIL  — cjclarke@nhbc.co.uk
#   JIRA_TOKEN  — Atlassian API token

name: Fetch Jira Sprint Data

on:
  schedule:
    - cron: '*/5 * * * 1-5'   # every 5 min, Mon–Fri
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fetch sprint + issues from Jira
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          set -e
          DOMAIN="nhbc.atlassian.net"
          BOARD="2766"
          AUTH="$JIRA_EMAIL:$JIRA_TOKEN"
          FIELDS="summary,status,issuetype,priority,assignee,customfield_10016"

          # Active sprint
          curl -sf -u "$AUTH" \
            "https://$DOMAIN/rest/agile/1.0/board/$BOARD/sprint?state=active" \
            -o /tmp/sprint_raw.json

          SPRINT_ID=$(python3 -c "
          import json
          d=json.load(open('/tmp/sprint_raw.json'))
          print(d['values'][0]['id'])
          ")

          # All issues (paginated)
          START=0; TOTAL=9999
          echo '[]' > /tmp/issues_all.json
          while [ $START -lt $TOTAL ]; do
            curl -sf -u "$AUTH" \
              "https://$DOMAIN/rest/agile/1.0/sprint/$SPRINT_ID/issue?startAt=$START&maxResults=100&fields=$FIELDS" \
              -o /tmp/page.json
            python3 - <<'PY'
          import json
          page = json.load(open('/tmp/page.json'))
          acc  = json.load(open('/tmp/issues_all.json'))
          acc += page['issues']
          with open('/tmp/issues_all.json','w') as f: json.dump(acc,f)
          with open('/tmp/meta.txt','w') as f:
              f.write(f"{page['total']}\n{len(page['issues'])}\n")
          PY
            read TOTAL PAGE_COUNT < /tmp/meta.txt || true
            START=$((START + PAGE_COUNT))
            [ "$PAGE_COUNT" = "0" ] && break
          done

          # Last 4 closed sprints for velocity history
          curl -sf -u "$AUTH" \
            "https://$DOMAIN/rest/agile/1.0/board/$BOARD/sprint?state=closed&maxResults=5" \
            -o /tmp/closed_raw.json

          python3 - <<'PY'
          import json, re, urllib.request, base64, os
          from datetime import datetime, timezone

          auth = os.environ['JIRA_EMAIL'] + ':' + os.environ['JIRA_TOKEN']
          b64  = base64.b64encode(auth.encode()).decode()
          hdr  = {'Authorization': 'Basic '+b64, 'Accept': 'application/json'}

          sprint_raw = json.load(open('/tmp/sprint_raw.json'))
          issues     = json.load(open('/tmp/issues_all.json'))
          closed_raw = json.load(open('/tmp/closed_raw.json'))

          sprint  = sprint_raw['values'][0]
          done_re = re.compile(r'done|complet|close|resolv', re.I)

          history = []
          for s in list(reversed(closed_raw.get('values', [])))[:4]:
              url = f"https://nhbc.atlassian.net/rest/agile/1.0/sprint/{s['id']}/issue?fields=status,customfield_10016&maxResults=500"
              req = urllib.request.Request(url, headers=hdr)
              with urllib.request.urlopen(req) as r:
                  d = json.loads(r.read())
              pts = sum(float(i['fields'].get('customfield_10016') or 0)
                        for i in d['issues']
                        if done_re.search(i['fields']['status']['name']))
              lbl = re.sub(r'^.*?sprint\s*', 'Spr ', s['name'], flags=re.I)[:10]
              history.append({'name': lbl, 'pts': round(pts), 'cur': False})

          cur_done = sum(float(i['fields'].get('customfield_10016') or 0)
                         for i in issues
                         if done_re.search(i['fields']['status']['name']))
          history_out = [{'name':'Current','pts':round(cur_done),'cur':True}] + history

          out = {
              'sprint':    sprint,
              'issues':    issues,
              'history':   history_out,
              'fetchedAt': datetime.now(timezone.utc).isoformat(),
          }
          with open('/tmp/data.json', 'w') as f:
              json.dump(out, f, separators=(',',':'))
          print(f"Fetched {len(issues)} issues — sprint: {sprint['name']}")
          PY

      - name: Commit data.json via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, base64, urllib.request, urllib.error, os

          token = os.environ['GH_TOKEN']
          repo  = os.environ['GH_REPO']
          path  = 'phoenix-dashboard/data.json'
          url   = f'https://api.github.com/repos/{repo}/contents/{path}'
          hdrs  = {
              'Authorization': 'token ' + token,
              'Accept':        'application/vnd.github.v3+json',
              'Content-Type':  'application/json',
              'User-Agent':    'github-actions-bot',
          }

          with open('/tmp/data.json', 'rb') as f:
              encoded = base64.b64encode(f.read()).decode()

          # Get existing file SHA (needed to update an existing file)
          sha = None
          try:
              req = urllib.request.Request(url, headers=hdrs)
              with urllib.request.urlopen(req) as r:
                  sha = json.loads(r.read())['sha']
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise

          body = {
              'message': 'chore: update sprint data [skip ci]',
              'content': encoded,
          }
          if sha:
              body['sha'] = sha

          req = urllib.request.Request(
              url, data=json.dumps(body).encode(), headers=hdrs, method='PUT'
          )
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
          print(f"Committed {path} @ {result['commit']['sha'][:7]}")
          PY
