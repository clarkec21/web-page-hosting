# .github/workflows/jira-fetch.yml
#
# Place this file in your GitHub Pages repository under .github/workflows/
# Add these repository secrets (Settings → Secrets → Actions):
#   JIRA_EMAIL  — cjclarke@nhbc.co.uk
#   JIRA_TOKEN  — your Atlassian API token
#
# The workflow fetches Jira sprint data server-side (no CORS, token stays secret)
# and commits data.json to the repo, which phoenix-sprint.html reads at same-origin.

name: Fetch Jira Sprint Data

on:
  schedule:
    # Every 5 minutes, Mon–Fri (UTC — adjust if your sprint hours differ)
    - cron: '*/5 * * * 1-5'
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch sprint + issues from Jira
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          set -e
          DOMAIN="nhbc.atlassian.net"
          BOARD="2766"
          AUTH="$JIRA_EMAIL:$JIRA_TOKEN"
          FIELDS="summary,status,issuetype,priority,assignee,customfield_10016"

          # Active sprint
          curl -sf -u "$AUTH" \
            "https://$DOMAIN/rest/agile/1.0/board/$BOARD/sprint?state=active" \
            -o /tmp/sprint_raw.json

          SPRINT_ID=$(python3 -c "
          import json,sys
          d=json.load(open('/tmp/sprint_raw.json'))
          print(d['values'][0]['id'])
          ")

          # All issues (paginated)
          START=0; TOTAL=9999
          echo '[]' > /tmp/issues_all.json
          while [ $START -lt $TOTAL ]; do
            curl -sf -u "$AUTH" \
              "https://$DOMAIN/rest/agile/1.0/sprint/$SPRINT_ID/issue?startAt=$START&maxResults=100&fields=$FIELDS" \
              -o /tmp/page.json
            python3 - <<'PY'
          import json
          page  = json.load(open('/tmp/page.json'))
          acc   = json.load(open('/tmp/issues_all.json'))
          acc  += page['issues']
          with open('/tmp/issues_all.json','w') as f: json.dump(acc,f)
          with open('/tmp/meta.txt','w') as f:
              f.write(f"{page['total']}\n{len(page['issues'])}\n")
          PY
            read TOTAL PAGE_COUNT < /tmp/meta.txt || true
            START=$((START + PAGE_COUNT))
            [ "$PAGE_COUNT" = "0" ] && break
          done

          # Last 4 closed sprints for velocity history
          curl -sf -u "$AUTH" \
            "https://$DOMAIN/rest/agile/1.0/board/$BOARD/sprint?state=closed&maxResults=5" \
            -o /tmp/closed_raw.json

          python3 - <<'PY'
          import json, re, subprocess, urllib.request, urllib.parse, base64, os
          from datetime import datetime, timezone

          auth = os.environ['JIRA_EMAIL'] + ':' + os.environ['JIRA_TOKEN']
          b64  = base64.b64encode(auth.encode()).decode()
          hdr  = {'Authorization': 'Basic '+b64, 'Accept': 'application/json'}

          sprint_raw  = json.load(open('/tmp/sprint_raw.json'))
          issues      = json.load(open('/tmp/issues_all.json'))
          closed_raw  = json.load(open('/tmp/closed_raw.json'))

          sprint = sprint_raw['values'][0]
          done_re = re.compile(r'done|complet|close|resolv', re.I)

          history = []
          for s in list(reversed(closed_raw.get('values', [])))[:4]:
              url = f"https://nhbc.atlassian.net/rest/agile/1.0/sprint/{s['id']}/issue?fields=status,customfield_10016&maxResults=500"
              req = urllib.request.Request(url, headers=hdr)
              with urllib.request.urlopen(req) as r:
                  d = json.loads(r.read())
              pts = sum(float(i['fields'].get('customfield_10016') or 0)
                        for i in d['issues']
                        if done_re.search(i['fields']['status']['name']))
              lbl = re.sub(r'^.*?sprint\s*', 'Spr ', s['name'], flags=re.I)[:10]
              history.append({'name': lbl, 'pts': round(pts), 'cur': False})

          cur_done = sum(float(i['fields'].get('customfield_10016') or 0)
                         for i in issues
                         if done_re.search(i['fields']['status']['name']))
          history_out = [{'name':'Current','pts':round(cur_done),'cur':True}] + history

          out = {
              'sprint':    sprint,
              'issues':    issues,
              'history':   history_out,
              'fetchedAt': datetime.now(timezone.utc).isoformat(),
          }
          with open('data.json', 'w') as f:
              json.dump(out, f, separators=(',',':'))
          print(f"Written data.json — {len(issues)} issues, sprint: {sprint['name']}")
          PY

      - name: Commit data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet || \
            git commit -m "chore: update sprint data [skip ci]" && \
            git push
